<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API - Posts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #loadBtn {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #loadBtn:hover {
            background-color: #45a049;
        }
        #output {
            margin-top: 20px;
        }
        .post {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .post h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .post p {
            margin: 0;
            color: #666;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h2>Fetch Posts Demo</h2>
    <button id="loadBtn">Load Posts</button>
    <div id="output"></div>

    <script>
        const btn = document.getElementById("loadBtn");
        const output = document.getElementById("output");

        btn.addEventListener("click", loadPosts);

        // Using Async/Await with fetch - with error handling
        async function loadPosts() {
            try {
                // Show loading state
                output.innerHTML = '<p class="loading">Loading posts...</p>';
                btn.disabled = true;

                // Fetch posts from API
                const response = await fetch("https://jsonplaceholder.typicode.com/posts");
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const posts = await response.json();
                
                // Display first 5 posts on webpage
                displayPosts(posts.slice(0, 5));
                
            } catch (error) {
                output.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            } finally {
                btn.disabled = false;
            }
        }

        // Function to display posts on the page
        function displayPosts(posts) {
            output.innerHTML = posts.map(post => `
                <div class="post">
                    <h3>${post.title}</h3>
                    <p>${post.body}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
