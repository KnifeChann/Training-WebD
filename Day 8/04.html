<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered Data Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        #loadBtn {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #loadBtn:hover {
            background-color: #45a049;
        }
        #output {
            margin-top: 20px;
        }
        .item {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .item h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .item p {
            margin: 0;
            color: #666;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h2>Ordered English Data Demo</h2>
    <button id="loadBtn">Load Ordered Data</button>
    <div id="output"></div>

    <script>
        const btn = document.getElementById("loadBtn");
        const output = document.getElementById("output");

        btn.addEventListener("click", loadData);

        // Ordered English data - local data instead of API
        const orderedData = [
            { id: 1, title: "First Item", description: "This is the first item in our ordered list." },
            { id: 2, title: "Second Item", description: "This is the second item in our ordered list." },
            { id: 3, title: "Third Item", description: "This is the third item in our ordered list." },
            { id: 4, title: "Fourth Item", description: "This is the fourth item in our ordered list." },
            { id: 5, title: "Fifth Item", description: "This is the fifth item in our ordered list." }
        ];

        // Simulate async fetch with local data
        function fetchOrderedData() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve(orderedData);
                }, 1500);
            });
        }

        // Using Async/Await with local data
        async function loadData() {
            try {
                // Show loading state
                output.innerHTML = '<p class="loading">Loading data...</p>';
                btn.disabled = true;

                // Simulate fetching ordered data
                const data = await fetchOrderedData();
                
                // Display data on webpage
                displayData(data);
                
            } catch (error) {
                output.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            } finally {
                btn.disabled = false;
            }
        }

        // Function to display data on the page
        function displayData(items) {
            output.innerHTML = items.map(item => `
                <div class="item">
                    <h3>${item.id}. ${item.title}</h3>
                    <p>${item.description}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
