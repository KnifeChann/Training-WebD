<!doctype html>
<html>

<head>
  <title>Async/Await Example</title>
</head>

<body>
  <h2>Async/Await Demo</h2>
  <button id="loadBtn">Load Data</button>
  <p id="output"></p>

  <script>
    // Promise-based function (same logic, different syntax)
    function fetchData() {
      return new Promise((resolve, reject) => {
        // simulate delay like API call
        setTimeout(() => {
          let success = true;

          if (success) {
            resolve("Data loaded successfully");
          } else {
            reject("Something went wrong");
          }
        }, 2000);
      });
    }

    // Async function - automatically returns a promise
    async function loadData() {
      try {
        document.getElementById("output").innerText = "Loading...";
        
        // await pauses execution until promise resolves
        // no need for .then() - code looks synchronous
        const result = await fetchData();
        
        document.getElementById("output").innerText = result;
      } catch (error) {
        // catch errors from both fetchData and previous lines
        document.getElementById("output").innerText = error;
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadData);
  </script>
</body>

</html>
